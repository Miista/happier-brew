name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Force a specific version (e.g. 0.2.1). Leave empty to auto-detect.'
        required: false
  schedule:
    - cron: '0 * * * *'  # check every hour

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(curl -sf https://api.github.com/repos/happier-dev/happier/releases \
              | jq -r '[.[] | select(.tag_name | startswith("cli-v"))] | first | .tag_name | ltrimstr("cli-v")')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          CURRENT=$(grep '^\s*version ' Casks/happier.rb | grep -o '[0-9.]*')
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already at v${VERSION}, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Updating from v${CURRENT} to v${VERSION}"
          fi

      - name: Fetch checksums
        if: steps.resolve.outputs.skip == 'false'
        id: checksums
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          BASE="https://github.com/happier-dev/happier/releases/download/cli-v${VERSION}"
          SUMS=$(curl -sf "${BASE}/checksums-happier-v${VERSION}.txt")
          ARM64=$(echo "$SUMS" | awk '/darwin-arm64/ {print $1}')
          X64=$(echo "$SUMS"   | awk '/darwin-x64/   {print $1}')
          echo "arm64=$ARM64" >> "$GITHUB_OUTPUT"
          echo "x64=$X64"     >> "$GITHUB_OUTPUT"

      - name: Update formula
        if: steps.resolve.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          ARM64="${{ steps.checksums.outputs.arm64 }}"
          X64="${{ steps.checksums.outputs.x64 }}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/happier.rb
          sed -i "s|sha256 \"[a-f0-9]*\" # arm64|sha256 \"${ARM64}\" # arm64|" Casks/happier.rb
          sed -i "s|sha256 \"[a-f0-9]*\" # x64|sha256 \"${X64}\" # x64|" Casks/happier.rb

      - name: Commit and push
        if: steps.resolve.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/happier.rb
          git commit -m "Update happier to v${{ steps.resolve.outputs.version }}"
          git push
